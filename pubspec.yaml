name: stkvpnpro
description: STK VPN Pro - کلاینت قدرتمند VPN با پشتیبانی sing-box
publish_to: 'none'
version: 1.0.38+3

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Core VPN & Networking
  flutter_singbox_vpn: ^1.1.3
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.0
  http: ^1.2.2
  connectivity_plus: ^6.0.3
  
  # UI & UX
  flutter_local_notifications: ^17.2.4
  provider: ^6.1.2
  qr_code_scanner: ^1.0.1
  url_launcher: ^6.3.0
  fluttertoast: ^8.2.8
  
  # Utils & Utilities
  package_info_plus: ^8.0.0
  path_provider: ^2.1.4
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: IranSans
      fonts:
        - asset: assets/fonts/IranSans.ttf
