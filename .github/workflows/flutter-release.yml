name: Flutter Release Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Repository
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | head -100

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.29.0"
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Check pubspec
        run: |
          pwd
          ls -la
          cat pubspec.yaml

      - name: Pub Get
        run: flutter pub get
