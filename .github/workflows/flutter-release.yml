name: Flutter Release (Stable Clean Build)

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      # 🚨 IMPORTANT FIX: stop auto migration
      - name: Disable Flutter auto upgrade
        run: flutter config --no-analytics

      - name: Clean environment
        run: |
          flutter clean
          rm -rf ~/.gradle
          rm -rf android/.gradle

      - name: Pub Get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
